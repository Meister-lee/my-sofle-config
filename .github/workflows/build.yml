name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: Install West and Build
        uses: zmkfirmware/zmk-action-setup@v1
      - name: Build ZMK Left
        run: west build -s app -b nice_nano_v2 -- -DSHIELD=sofle_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build ZMK Right
        run: west build -p -s app -b nice_nano_v2 -- -DSHIELD=sofle_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename UF2
        run: |
          cp build/zephyr/zmk.uf2 sofle_left.uf2
          # 오른쪽 빌드 결과물 위치 확인을 위해 경로를 명시적으로 복사합니다
          if [ -f build/zephyr/zmk.uf2 ]; then cp build/zephyr/zmk.uf2 sofle_right.uf2; fi
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
