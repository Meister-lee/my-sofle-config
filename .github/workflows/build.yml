name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        shield: [sofle_left, sofle_right]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
      - name: Build ZMK
        run: west build -s zmk/app -b puchi_ble -- -DSHIELD=${{ matrix.shield }} -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename artifacts
        run: cp build/zephyr/zmk.uf2 build/zephyr/${{ matrix.shield }}.uf2
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
