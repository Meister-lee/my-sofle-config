name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
      - name: Build ZMK Left
        # 보드 목록에 있던 'puchi_ble'을 사용합니다.nice!nano v2와 똑같은 nRF52840 기반이면서 핀 이름 충돌이 없습니다.
        run: west build -s zmk/app -b puchi_ble -- -DSHIELD=sofle_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build ZMK Right
        run: west build -p -s zmk/app -b puchi_ble -- -DSHIELD=sofle_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
