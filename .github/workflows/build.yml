name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
      - name: Patch Sofle Shield (Final Fix)
        run: |
          # 에러의 원인인 pro_micro_i2c 참조 줄을 강제로 삭제합니다.
          sed -i '/&pro_micro_i2c/d' zmk/app/boards/shields/sofle/sofle.dtsi
          sed -i '/pro_micro_i2c/d' zmk/app/boards/shields/sofle/sofle.dtsi
      - name: Build ZMK Left
        run: west build -s zmk/app -b promicro_nrf52840 -- -DSHIELD=sofle_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build ZMK Right
        run: west build -p -s zmk/app -b promicro_nrf52840 -- -DSHIELD=sofle_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
