name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
      - name: Build ZMK Left
        run: west build -s app -b nice_nano_v2 -- -DSHIELD=sofle_left
      - name: Rename Left UF2
        run: cp build/zephyr/zmk.uf2 sofle_left.uf2
      - name: Build ZMK Right
        run: west build -p -s app -b nice_nano_v2 -- -DSHIELD=sofle_right
      - name: Rename Right UF2
        run: cp build/zephyr/zmk.uf2 sofle_right.uf2
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
